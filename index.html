<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-11 Studio | The Black Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="fixed inset-0 noise-bg opacity-10 pointer-events-none z-0"></div>

    <header class="p-8 flex justify-between items-center fade-in">
        <div class="h-10">
            <img src="assets/logo.png" class="h-full invert">
        </div>
    </header>

    <main class="flex-grow flex flex-col justify-center px-6 max-w-7xl mx-auto py-20">
        <h1 class="text-[13vw] font-black uppercase">
            THE BLACK <br>
            <span class="border-text-white">EDITION</span>
        </h1>

        <form id="subscribe-form" class="mt-10">
            <input type="email" placeholder="Join the inner circle"
                class="w-full bg-transparent border-b border-white/20 py-4 outline-none">
        </form>

        <div id="success-msg" class="hidden mt-6">
            Access Granted. Talk soon.
        </div>
    </main>

    <footer class="p-8 border-t border-white/10 text-center">
        Mumbai • Worldwide • 2025
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
