<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-11 | Coming Soon</title>
    <!-- Tailwind CSS for utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CUSTOM CSS VARIABLES */
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --text-very-muted: rgba(255, 255, 255, 0.15);
            --accent-white: #ffffff;
            --transition-speed: 0.6s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* TYPOGRAPHY EFFECTS */
        .border-text-white {
            -webkit-text-stroke: 1.5px var(--text-very-muted);
            color: transparent;
            transition: all var(--transition-speed) cubic-bezier(0.16, 1, 0.3, 1);
        }

        .border-text-white:hover {
            -webkit-text-stroke: 1.5px var(--text-main);
        }
        
        @media (max-width: 768px) {
            .border-text-white { -webkit-text-stroke: 1px var(--text-very-muted); }
        }

        /* ANIMATIONS */
        .animate-pulse-slow {
            animation: pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.05; }
            50% { opacity: 0.2; }
        }

        .noise-bg {
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
        }

        /* ENTRANCE ANIMATION */
        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FORM CUSTOMIZATION */
        input::placeholder {
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.6rem;
            color: var(--text-very-muted);
            font-weight: 900;
        }

        #subscribe-form input {
            transition: border-color var(--transition-speed) ease;
        }

        #subscribe-form input:focus {
            border-color: var(--text-main);
        }

        /* CUSTOM SELECTION COLOR */
        ::selection {
            background-color: var(--text-main);
            color: var(--bg-color);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-white selection:text-black">
    
    <!-- Background Texture & Ambient Lights -->
    <div class="fixed inset-0 noise-bg opacity-10 pointer-events-none z-0"></div>
    <div class="fixed top-[-25%] left-[-15%] w-[80vw] h-[80vw] bg-white/5 blur-[180px] rounded-full pointer-events-none z-0"></div>
    <div class="fixed bottom-[-15%] right-[-15%] w-[60vw] h-[60vw] bg-white/5 blur-[150px] rounded-full pointer-events-none z-0"></div>

    <!-- Navigation Header -->
    <header class="p-8 md:p-12 relative z-10 flex justify-between items-center fade-in" style="animation-delay: 0.2s;">
        <div class="h-10 md:h-12 flex items-center group cursor-pointer">
            <!-- Simplified Path: Renaming your file to logo.png in the assets folder is highly recommended -->
            <img 
                src="assets/logo.png" 
                alt="4-11 Logo" 
                class="h-full w-auto object-contain transition-transform duration-700 group-hover:scale-110"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
            >
            <div class="text-3xl font-black tracking-tighter italic uppercase transition-transform hover:scale-105">4-11</div>
        </div>
        <nav class="flex gap-10 text-[10px] font-black tracking-[0.5em] uppercase text-white/30">
            <a href="https://www.instagram.com/four_eleven.in/" target="_blank" class="hover:text-white transition-all hover:tracking-[0.7em]">Instagram</a>
            <a href="#" class="hover:text-white transition-all hover:tracking-[0.7em]">LinkedIn</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <main class="flex-grow flex flex-col justify-center px-6 relative z-10 max-w-7xl mx-auto w-full py-20">
        <div class="fade-in" style="animation-delay: 0.4s;">
            <div class="flex items-center gap-6 mb-16">
                <span class="w-20 h-[1px] bg-white/20"></span>
                <span class="text-[10px] font-black uppercase tracking-[0.8em] text-white/30">
                    EST. 2025 • BRANDING
                </span>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-20 items-center mb-32">
                <div class="lg:col-span-8">
                    <h1 class="text-[14vw] md:text-[10vw] font-black leading-[0.75] tracking-[-0.07em] uppercase">
                        STAYING <br />
                        <span class="text-transparent border-text-white">HIDDEN</span> <br />
                        FOR NOW.
                    </h1>
                </div>
                <div class="lg:col-span-4 flex justify-center lg:justify-end">
                    <div class="w-full max-w-[320px] md:max-w-[420px] aspect-square relative fade-in" style="animation-delay: 0.8s;">
                        <!-- Updated Hero Image with fallback logic -->
                        <div class="w-full h-full flex items-center justify-center border border-white/5 rounded-2xl bg-white/[0.02]">
                            <img 
                                src="assets/logo.png" 
                                alt="4-11 Visual Identity" 
                                class="w-full h-full object-contain opacity-90 transition-all duration-1000"
                                onerror="this.classList.add('hidden'); this.parentElement.innerHTML='<div class=\'text-5xl font-black opacity-10 uppercase italic\'>4-11</div>';"
                            >
                        </div>
                        <div class="absolute inset-0 bg-white/5 blur-[100px] -z-10 rounded-full animate-pulse-slow"></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row justify-between items-end gap-24">
                <div class="max-w-2xl fade-in" style="animation-delay: 1s;">
                    <p class="text-3xl md:text-5xl text-white/40 font-black tracking-tighter leading-none mb-8">
                        STRIPPING AWAY <br /> THE NOISE.
                    </p>
                    <p class="text-lg text-white/20 font-medium leading-relaxed max-w-md">
                        We are currently refining the 4-11 visual system. Our new digital experience and portfolio will drop when the information is ready.
                    </p>
                </div>

                <!-- Subscription Form -->
                <div class="max-w-md w-full fade-in" style="animation-delay: 1.2s;">
                    <form id="subscribe-form" class="relative flex flex-col group">
                        <label for="email-input" class="text-[9px] font-black tracking-[0.4em] uppercase text-white/20 mb-4 ml-1">The Inner Circle</label>
                        <div class="relative flex items-center">
                            <input 
                                type="email" 
                                id="email-input"
                                required
                                placeholder="Enter your email" 
                                class="w-full bg-transparent border-b border-white/10 py-6 px-1 outline-none transition-colors font-bold text-2xl md:text-3xl placeholder:text-white/5"
                            >
                            <button 
                                type="submit"
                                class="absolute right-0 text-white/20 hover:text-white transition-all flex items-center gap-4 group"
                                aria-label="Notify Me"
                            >
                                <span class="text-[9px] font-black uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">Request Access</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right group-hover:translate-x-2 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            </button>
                        </div>
                    </form>
                    <div id="success-msg" class="hidden flex items-center gap-6 text-white font-black uppercase tracking-[0.2em] text-xs py-10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check-circle-2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                        <span>Access Granted. Stand by.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-8 md:p-12 relative z-10 flex flex-col md:flex-row justify-between items-center gap-10 border-t border-white/5 mt-auto fade-in" style="animation-delay: 1.4s;">
        <div class="flex items-center gap-5">
            <div class="w-2 h-2 bg-white rounded-full animate-pulse shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
            <p class="text-[9px] font-black text-white/20 uppercase tracking-[0.6em]">
                LIVE STATUS • ACTIVE
            </p>
        </div>
        <div class="flex gap-16">
            <div class="group flex items-center gap-4 text-white/20 text-[10px] font-black uppercase tracking-widest hover:text-white transition-all cursor-pointer" onclick="window.location.href='mailto:hello@4eleven.in'">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <span>Email Us</span>
            </div>
        </div>
    </footer>

    <!-- Interactive Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('subscribe-form');
            const success = document.getElementById('success-msg');
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                // Smooth state transition
                form.style.opacity = '0';
                form.style.transform = 'translateY(-10px)';
                form.style.transition = 'all 0.5s ease';
                form.style.pointerEvents = 'none';
                
                setTimeout(() => {
                    form.classList.add('hidden');
                    success.classList.remove('hidden');
                    success.style.opacity = '0';
                    success.style.transform = 'translateY(10px)';
                    
                    // Trigger reflow for animation
                    requestAnimationFrame(() => {
                        success.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                        success.style.opacity = '1';
                        success.style.transform = 'translateY(0)';
                    });
                }, 500);
            });
        });
    </script>
</body>
</html>
